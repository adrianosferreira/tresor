services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tresor
      POSTGRES_USER: tresor
      POSTGRES_PASSWORD: tresor_dev_password
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tresor -d tresor"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/server
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tresor:tresor_dev_password@db:5432/tresor?sslmode=disable
      JWT_SECRET: dev-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost:5173
      ADDR: ":8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  client:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.client-dev
    ports:
      - "5173:5173"
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/packages/crypto/node_modules
      - /app/packages/shared/node_modules
      - /app/apps/client/node_modules
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 90s

volumes:
  pgdata_dev:
